services:
  - type: web
    name: hrms-lite-backend
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && gunicorn hrms.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "your-app.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-app.vercel.app"

databases:
  - name: hrms-lite-db
    databaseName: hrms_lite
    user: hrms_user
    plan: free
